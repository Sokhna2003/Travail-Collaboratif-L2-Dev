<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main-footer {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 2rem 0 1rem;
            font-family: sans-serif;
            margin-top: auto; /* Aide à pousser le footer en bas */
        }

        .footer-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .footer-section {
            flex: 1;
            margin-bottom: 20px;
            min-width: 250px;
        }

        .footer-section h3, .footer-section h4 {
            color: #3498db;
        }

        .footer-section ul {
            list-style: none;
            padding: 0;
        }

        .footer-section ul li a {
            color: #bdc3c7;
            text-decoration: none;
            transition: 0.3s;
        }

        .footer-section ul li a:hover {
            color: #ffffff;
        }

        .footer-bottom {
            text-align: center;
            border-top: 1px solid #34495e;
            padding-top: 1rem;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

    </style>
</head>
<body>
    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-section about">
                <h3>Travail-Collaboratif-L2-Dev</h3>
                <p>Travail collaboratif sur Git & GitHub - Équipe de 8 étudiants</p>
            </div>
            <div class="footer-section links">
                <h4>Liens rapides</h4>
                <ul>
                    <li><a href="#">Accueil</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </div>
            <div class="footer-section social">
                <h4>Suivez-nous</h4>
                <div class="social-icons">
                    <span>GitHub</span>
                </div>
            </div>
        </div>
        
        <div class="footer-bottom">
            &copy; 2024 | Conçu par la L2 Dev-Web
        </div>

    </footer>

</body>
</html>
